<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-label="Step 3: Create a key with data:read">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="sh3" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="720" height="420" fill="url(#bg3)"/>
  <g filter="url(#sh3)">
    <rect x="80" y="50" width="560" height="300" rx="16" fill="#0b1220" stroke="#334155"/>
    <text x="108" y="92" fill="#f8fafc" font-family="ui-sans-serif,system-ui,sans-serif" font-size="18" font-weight="700">Create API key</text>
    <text x="108" y="118" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Name</text>
    <rect x="108" y="126" width="320" height="36" rx="8" fill="#1e293b" stroke="#475569"/>
    <text x="120" y="149" fill="#e2e8f0" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13">Subscribers dashboard</text>
    <text x="108" y="188" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Permissions</text>
    <!-- permission chips -->
    <rect x="108" y="200" width="100" height="32" rx="16" fill="#134e4a" stroke="#2dd4bf" stroke-width="2"/>
    <text x="124" y="221" fill="#ecfdf5" font-family="ui-monospace,monospace" font-size="12" font-weight="700">data:read</text>
    <rect x="220" y="200" width="90" height="32" rx="16" fill="#1e293b" stroke="#475569"/>
    <text x="236" y="221" fill="#64748b" font-family="ui-monospace,monospace" font-size="12">write</text>
    <rect x="320" y="200" width="90" height="32" rx="16" fill="#1e293b" stroke="#475569"/>
    <text x="336" y="221" fill="#64748b" font-family="ui-monospace,monospace" font-size="12">admin</text>
    <rect x="108" y="260" width="160" height="40" rx="10" fill="#0f766e"/>
    <text x="140" y="285" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">Create key</text>
  </g>
  <rect x="430" y="300" width="220" height="56" rx="12" fill="#fef3c7"/>
  <text x="446" y="324" fill="#b45309" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700">3. Turn on data:read only</text>
  <text x="446" y="342" fill="#92400e" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">You do not need write access</text>
</svg>
