<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-label="Step 1: Open Superwall in your browser">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="720" height="420" fill="url(#bg)"/>
  <!-- browser chrome -->
  <g filter="url(#shadow)">
    <rect x="48" y="48" width="624" height="324" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1"/>
    <rect x="48" y="48" width="624" height="40" rx="14" fill="#111827"/>
    <rect x="48" y="74" width="624" height="14" fill="#111827"/>
    <circle cx="72" cy="68" r="6" fill="#ef4444"/>
    <circle cx="92" cy="68" r="6" fill="#f59e0b"/>
    <circle cx="112" cy="68" r="6" fill="#22c55e"/>
    <rect x="140" y="56" width="420" height="24" rx="8" fill="#1f2937"/>
    <text x="156" y="72" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">superwall.com</text>
  </g>
  <!-- page content -->
  <text x="80" y="130" fill="#f8fafc" font-family="ui-sans-serif,system-ui,sans-serif" font-size="22" font-weight="700">Superwall</text>
  <text x="80" y="158" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13">Your paywall dashboard</text>
  <rect x="80" y="190" width="200" height="120" rx="12" fill="#1e293b" stroke="#334155"/>
  <rect x="100" y="214" width="100" height="10" rx="4" fill="#334155"/>
  <rect x="100" y="236" width="160" height="10" rx="4" fill="#334155"/>
  <rect x="100" y="258" width="120" height="10" rx="4" fill="#334155"/>
  <rect x="100" y="280" width="80" height="12" rx="6" fill="#0f766e"/>
  <!-- callout -->
  <rect x="420" y="170" width="220" height="72" rx="12" fill="#ccfbf1" stroke="#99f6e4"/>
  <text x="436" y="200" fill="#0f766e" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">1. Open Superwall</text>
  <text x="436" y="222" fill="#115e59" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Log in at superwall.com</text>
</svg>
